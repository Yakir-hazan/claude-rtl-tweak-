name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz

      - name: Setup Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/releases/download/2023-09-22/iPhoneOS16.5.sdk.tar.xz -o sdk.tar.xz
          file sdk.tar.xz
          tar -xf sdk.tar.xz -C $THEOS/sdks

      - name: Build DEB
        env:
          THEOS: ${{ github.workspace }}/theos
        run: make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: claude-rtl-tweak
          path: packages/*.deb
