name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -LO https://github.com/theos/sdks/releases/download/2023-09-22/iPhoneOS16.5.sdk.tar.xz
          mkdir -p $THEOS/sdks
          tar -xf iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build DEB
        run: make package
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: claude-rtl-tweak
          path: packages/*.deb
