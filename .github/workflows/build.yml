name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid xz

      - name: Setup Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          git clone --depth=1 https://github.com/aricloverCN/sdks.git /tmp/sdks
          cp -r /tmp/sdks/iPhoneOS16.5.sdk $THEOS/sdks/

      - name: Build DEB
        env:
          THEOS: ${{ github.workspace }}/theos
        run: make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: claude-rtl-tweak
          path: packages/*.deb
